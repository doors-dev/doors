name: Test

on:
  push:
    branches:
      - main
      - gox
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Run test suite with coverage
        run: |
          allpkgs=$(go list ./...)
          coverpkg=$(echo "$allpkgs" | grep -v '^github.com/doors-dev/doors/internal/test' | paste -sd,)
          go test -count=1 -p 1 -coverpkg="$coverpkg" -coverprofile=coverage.txt $allpkgs

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.txt
          fail_ci_if_error: false
          verbose: true
